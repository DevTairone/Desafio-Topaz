# Perfil de desenvolvimento local: banco H2 em memoria.
spring:
  datasource:
    url: "jdbc:h2:mem:desafio;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      # 'update' e adequado apenas para dev/local; em producao o schema deve ser
      # controlado por uma ferramenta de migracao (ex.: Flyway/Liquibase).
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.sys_top.desafio: DEBUG
